<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>VMC - Vivado Methodology Checker</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --border: #2a2a40;
  --text: #e0e0e8;
  --muted: #8888a0;
  --accent: #7c3aed;
  --fail: #ef4444;
  --warn: #f59e0b;
  --pass: #22c55e;
  --critical: #dc2626;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  overflow-y: auto;
  height: 100vh;
  font-size: 13px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.header h1 { font-size: 14px; font-weight: 600; }
.score {
  font-size: 20px; font-weight: 700;
  padding: 4px 12px; border-radius: 8px;
}
.score.pass { background: rgba(34,197,94,0.15); color: var(--pass); }
.score.fail { background: rgba(239,68,68,0.15); color: var(--fail); }

/* State panels */
.panel { display: none; }
.panel.active { display: block; }

.status {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Instance selection */
.instance-list {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 12px;
}
.instance-item {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid transparent;
  margin-bottom: 4px;
}
.instance-item:hover {
  background: rgba(124,58,237,0.1);
  border-color: var(--accent);
}
.instance-item .name { font-weight: 600; color: var(--text); }
.instance-item .meta { font-size: 11px; color: var(--muted); }

/* Phase table */
.phase-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 12px;
  font-size: 12px;
}
.phase-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.phase-table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.phase-table tr:hover { background: rgba(255,255,255,0.02); }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.status-badge.complete { background: rgba(34,197,94,0.15); color: var(--pass); }
.status-badge.running { background: rgba(245,158,11,0.15); color: var(--warn); }
.status-badge.failed { background: rgba(239,68,68,0.15); color: var(--fail); }
.status-badge.waiting { background: rgba(136,136,160,0.1); color: var(--muted); }

/* Project info */
.project-info {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
  padding: 8px;
  background: var(--card);
  border-radius: 6px;
}

/* Buttons */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-right: 8px;
  margin-bottom: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--border); color: var(--text); }

/* Guide */
.guide {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 12px;
  color: var(--muted);
  margin-top: 12px;
}
.guide kbd {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--border);
  color: var(--text);
  font-family: monospace;
  font-size: 11px;
}

/* Issue cards */
.issue-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.issue-card:hover { border-color: var(--accent); }
.issue-card .title {
  font-size: 12px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.issue-card .detail {
  display: none;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}
.issue-card.expanded .detail { display: block; }

.sev-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.sev-dot.critical { background: var(--critical); }
.sev-dot.fail { background: var(--fail); }
.sev-dot.warn { background: var(--warn); }
.sev-dot.info { background: #60a5fa; }

.badge {
  display: inline-block; padding: 2px 6px;
  border-radius: 4px; font-size: 10px; font-weight: 600;
}
.badge.b-critical { background: rgba(220,38,38,0.15); color: var(--critical); }
.badge.b-fail { background: rgba(239,68,68,0.15); color: var(--fail); }
.badge.b-warn { background: rgba(245,158,11,0.15); color: var(--warn); }
.badge.b-info { background: rgba(96,165,250,0.15); color: #60a5fa; }

/* AI Summary */
.ai-panel {
  background: rgba(124,58,237,0.08);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 8px;
  padding: 12px;
  margin-top: 12px;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai-panel h3 {
  color: var(--accent);
  font-size: 13px;
  margin-bottom: 8px;
}

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.tab {
  padding: 4px 10px; border-radius: 6px; font-size: 12px;
  cursor: pointer; background: var(--card);
  border: 1px solid var(--border); color: var(--muted);
  transition: all 0.2s;
}
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.tab:hover { border-color: var(--accent); }

/* Root cause panel */
.root-cause-panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;
  border-left: 3px solid var(--accent);
}
.root-cause-panel h3 { font-size: 12px; color: var(--accent); margin-bottom: 6px; }
.root-cause-panel p { font-size: 11px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; }

.fix {
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 6px; padding: 8px; margin-top: 6px;
  font-family: 'Consolas', monospace;
  font-size: 11px; white-space: pre-wrap; color: #a0d0a0;
  position: relative;
}
.copy-btn {
  position: absolute; top: 4px; right: 4px;
  background: none; border: 1px solid rgba(34,197,94,0.3);
  color: var(--pass); padding: 2px 8px; border-radius: 4px;
  cursor: pointer; font-size: 10px;
}

.ai-section {
  background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2);
  border-radius: 6px; padding: 8px; margin-top: 6px;
  font-size: 11px; color: #c0b0e0; line-height: 1.5; white-space: pre-wrap;
}

/* Config panel */
.config-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.config-modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 420px; max-width: 90vw;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.config-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.config-header h3 { font-size: 14px; }
.close-btn {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
}
.config-body { padding: 12px 16px; }
.form-row { margin-bottom: 10px; }
.form-row label {
  display: block; font-size: 11px; color: var(--muted);
  margin-bottom: 4px;
}
.form-row input, .form-row select {
  width: 100%; padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
}
.form-row input:focus, .form-row select:focus {
  outline: none; border-color: var(--accent);
}
.form-row .hint {
  font-size: 10px; color: var(--muted); margin-top: 2px;
  display: block;
}
</style>
</head>
<body>

<div class="header">
  <h1>VMC - Methodology Checker</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn btn-secondary" onclick="showConfigPanel()" style="margin:0">⚙️ 设置</button>
    <div id="scoreDisplay" class="score pass" style="display:none">--</div>
  </div>
</div>

<!-- LLM Config Panel -->
<div id="configPanel" class="config-overlay" style="display:none">
  <div class="config-modal">
    <div class="config-header">
      <h3>LLM 配置</h3>
      <button class="close-btn" onclick="hideConfigPanel()">&times;</button>
    </div>
    <div class="config-body">
      <div class="form-row">
        <label>Provider</label>
        <select id="cfgProvider">
          <option value="claude">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
          <option value="local">Local (Ollama/vLLM)</option>
        </select>
      </div>
      <div class="form-row">
        <label>Model</label>
        <input type="text" id="cfgModel" placeholder="claude-sonnet-4-20250514">
      </div>
      <div class="form-row">
        <label>API Key</label>
        <input type="password" id="cfgApiKey" placeholder="sk-...">
        <span class="hint">留空则使用环境变量或配置文件</span>
      </div>
      <div class="form-row">
        <label>Base URL (可选)</label>
        <input type="text" id="cfgBaseUrl" placeholder="https://api.anthropic.com">
      </div>
      <div class="form-row">
        <label>Max Tokens</label>
        <input type="number" id="cfgMaxTokens" value="2048" min="256" max="8192">
      </div>
      <div class="form-row">
        <label>Temperature</label>
        <input type="number" id="cfgTemperature" value="0.3" min="0" max="1" step="0.1">
      </div>
      <div class="form-row" style="text-align:right">
        <button class="btn btn-secondary" onclick="hideConfigPanel()">取消</button>
        <button class="btn btn-primary" onclick="saveConfig()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- State: waiting -->
<div id="panel-waiting" class="panel active">
  <div class="status">
    <div class="spinner"></div>
    <p id="waitingText">扫描 Vivado 中...</p>
    <p style="font-size:11px;margin-top:8px;color:var(--muted)">提示：首次使用需重启 Vivado 以加载 Tcl Server</p>
  </div>
</div>

<!-- State: select_vivado -->
<div id="panel-select" class="panel">
  <div class="instance-list" id="instanceList">
    <p style="color:var(--muted);margin-bottom:8px">检测到多个 Vivado 实例，请选择：</p>
  </div>
</div>

<!-- State: ready -->
<div id="panel-ready" class="panel">
  <div class="project-info" id="projectInfo"></div>

  <table class="phase-table">
    <thead>
      <tr><th>#</th><th>阶段</th><th>状态</th><th>进度</th><th>报告</th><th>操作</th></tr>
    </thead>
    <tbody id="phaseTableBody"></tbody>
  </table>

  <div>
    <button class="btn btn-primary" onclick="analyzeStage('opt')">分析 OPT</button>
    <button class="btn btn-primary" onclick="analyzeStage('place')">分析布局</button>
    <button class="btn btn-primary" onclick="analyzeStage('route')">分析布线</button>
    <button class="btn btn-secondary" onclick="clearReports()">清理报告</button>
  </div>

  <div class="guide">
    <strong>快捷键：</strong><br>
    点击上方按钮触发对应阶段的分析<br>
    <kbd>1</kbd> 分析 OPT（全面） <kbd>2</kbd> 分析布局（增量） <kbd>3</kbd> 分析布线（增量）
  </div>
</div>

<!-- State: analyzing -->
<div id="panel-analyzing" class="panel">
  <div class="status">
    <div class="spinner"></div>
    <p>分析中，请等待 Vivado 生成报告...</p>
    <p style="font-size:11px;margin-top:8px;color:var(--muted)">报告命令在 Vivado 中执行，可能需要几分钟</p>
  </div>
</div>

<!-- State: results -->
<div id="panel-results" class="panel">
  <div id="rootCausePanel" class="root-cause-panel" style="display:none"></div>

  <div class="tabs">
    <div class="tab active" data-filter="all" onclick="setFilter('all')">全部</div>
    <div class="tab" data-filter="CRITICAL" onclick="setFilter('CRITICAL')">严重</div>
    <div class="tab" data-filter="FAIL" onclick="setFilter('FAIL')">失败</div>
    <div class="tab" data-filter="WARN" onclick="setFilter('WARN')">警告</div>
  </div>

  <div id="aiSummaryPanel" class="ai-panel" style="display:none">
    <h3>AI 分析总结</h3>
    <div id="aiSummaryContent"></div>
  </div>

  <div id="issueList"></div>

  <div style="margin-top:12px">
    <button class="btn btn-primary" onclick="backToReady()">返回</button>
    <button class="btn btn-secondary" onclick="reAnalyze()">重新分析</button>
  </div>
</div>

<script>
// ── API Client ──
let API_BASE = '';
let ws = null;
let currentFilter = 'all';
let currentResult = null;
let isAnalyzing = false;

async function apiGet(path) {
  const r = await fetch(API_BASE + path);
  return r.json();
}

async function apiPost(path) {
  const r = await fetch(API_BASE + path, { method: 'POST' });
  return r.json();
}

// ── WebSocket ──
function connectWebSocket() {
  if (!API_BASE) return;
  
  const wsUrl = API_BASE.replace(/^http/, 'ws') + '/ws';
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log('WebSocket connected');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') {
      handleStateChange(msg.state);
    } else if (msg.type === 'result') {
      currentResult = msg.data;
      renderResults(msg.data);
    }
  };

  ws.onclose = () => {
    console.log('WebSocket disconnected, retrying...');
    setTimeout(connectWebSocket, 2000);
  };

  ws.onerror = (e) => {
    console.error('WebSocket error:', e);
  };
}

// ── Wails API Discovery ──
function initWails() {
  let retryCount = 0;
  const maxRetries = 60;
  
  const checkApi = () => {
    // 已经设置好了
    if (API_BASE) return;
    
    // 尝试 Wails 运行时
    if (typeof go !== 'undefined' && go.main && go.main.App) {
      go.main.App.GetAPIURL().then(url => {
        if (url && url.startsWith('http')) {
          API_BASE = url;
          connectWebSocket();
          fetchInitialState();
          return;
        }
        // URL 还没准备好，继续等待
        retry();
      }).catch(() => retry());
    } else {
      // 非 Wails 环境（浏览器直接访问 Python 服务）
      API_BASE = '';
      connectWebSocket();
      fetchInitialState();
    }
  };
  
  const retry = () => {
    retryCount++;
    if (retryCount < maxRetries) {
      setTimeout(checkApi, 500);
    } else {
      console.error('Failed to get API URL');
      document.getElementById('waitingText').textContent = '无法连接到 API 服务，请重启应用';
    }
  };
  
  checkApi();
}

function fetchInitialState() {
  apiGet('/api/state').then(data => {
    handleStateChange(data.state || 'waiting');
  }).catch(err => {
    console.error('Failed to fetch initial state:', err);
  });
}

// ── State Management ──
const panels = {
  waiting: document.getElementById('panel-waiting'),
  select_vivado: document.getElementById('panel-select'),
  ready: document.getElementById('panel-ready'),
  analyzing: document.getElementById('panel-analyzing'),
  results: document.getElementById('panel-results'),
};

function showPanel(name) {
  Object.values(panels).forEach(p => p.classList.remove('active'));
  if (panels[name]) panels[name].classList.add('active');
}

async function handleStateChange(state) {
  showPanel(state);

  if (state === 'ready') {
    await refreshReadyPanel();
  } else if (state === 'select_vivado') {
    await refreshInstanceList();
  } else if (state === 'results') {
    const result = await apiGet('/api/analysis_result');
    if (result && !result.error) {
      currentResult = result;
      renderResults(result);
    }
  }
}

async function refreshReadyPanel() {
  const [stateData, runStatus] = await Promise.all([
    apiGet('/api/state'),
    apiGet('/api/run_status'),
  ]);

  // Project info
  const proj = stateData.project_info || {};
  document.getElementById('projectInfo').innerHTML =
    (proj.name ? `项目: ${esc(proj.name)}<br>` : '') +
    (proj.part ? `器件: ${esc(proj.part)}` : '');

  // Phase table
  const phases = [
    { key: 'opt', name: 'OPT 后', num: '1' },
    { key: 'place', name: '布局后', num: '2' },
    { key: 'route', name: '布线后', num: '3' },
  ];

  const tbody = document.getElementById('phaseTableBody');
  tbody.innerHTML = phases.map(p => {
    const info = runStatus[p.key] || {};
    const stage = info.stage || 'unknown';
    const progress = info.progress || '';

    let statusText, statusClass;
    if (stage === 'complete') { statusText = '已完成'; statusClass = 'complete'; }
    else if (stage === 'running') { statusText = '运行中'; statusClass = 'running'; }
    else if (stage === 'failed') { statusText = '失败'; statusClass = 'failed'; }
    else { statusText = '未开始'; statusClass = 'waiting'; }

    const canAnalyze = stage === 'complete';

    return `<tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
      <td><span class="status-badge ${statusClass}">${statusText}</span></td>
      <td>${progress || '-'}</td>
      <td id="report-${p.key}">?</td>
      <td>${canAnalyze ? '<span style="color:var(--accent)">可分析</span>' : '<span style="color:var(--muted)">不可用</span>'}</td>
    </tr>`;
  }).join('');
}

async function refreshInstanceList() {
  const data = await apiGet('/api/state');
  const instances = data.vivado_instances || [];
  const container = document.getElementById('instanceList');

  let html = '<p style="color:var(--muted);margin-bottom:8px">检测到 ' + instances.length + ' 个 Vivado 实例，请选择：</p>';
  instances.forEach((inst, i) => {
    const name = inst.project_name || '未知项目';
    const part = inst.part || '';
    const port = inst.port || '';
    html += `<div class="instance-item" onclick="selectInstance(${i})">
      <span class="name">${esc(name)}</span>
      <span class="meta">${part ? '(' + esc(part) + ')' : ''} 端口:${port}</span>
    </div>`;
  });
  container.innerHTML = html;
}

async function selectInstance(index) {
  await apiPost('/api/select_vivado/' + index);
}

async function analyzeStage(stage) {
  if (isAnalyzing) {
    alert('分析正在进行中，请等待完成');
    return;
  }
  isAnalyzing = true;
  showPanel('analyzing');
  try {
    await apiPost('/api/analyze/' + stage);
  } finally {
    isAnalyzing = false;
  }
}

async function clearReports() {
  await apiPost('/api/clear_reports');
  await refreshReadyPanel();
}

function backToReady() {
  showPanel('ready');
}

async function reAnalyze() {
  await analyzeStage('current');
}

// ── Results Rendering ──
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-filter="' + filter + '"]').classList.add('active');
  if (currentResult) renderResults(currentResult);
}

function renderResults(data) {
  if (!data || data.error) {
    document.getElementById('issueList').innerHTML =
      '<p style="color:var(--fail)">' + (data ? data.error : '无数据') + '</p>';
    return;
  }

  // Score
  const scoreEl = document.getElementById('scoreDisplay');
  scoreEl.textContent = data.score + '/100';
  scoreEl.className = 'score ' + (data.score >= 80 ? 'pass' : 'fail');
  scoreEl.style.display = '';

  // Root cause
  const rcp = document.getElementById('rootCausePanel');
  if (data.root_cause_summary) {
    rcp.innerHTML = '<h3>根因分析</h3><p>' + esc(data.root_cause_summary) + '</p>';
    rcp.style.display = '';
  } else {
    rcp.style.display = 'none';
  }

  // AI Summary
  const aiPanel = document.getElementById('aiSummaryPanel');
  const aiContent = document.getElementById('aiSummaryContent');
  if (data.ai_summary) {
    aiContent.textContent = data.ai_summary;
    aiPanel.style.display = '';
  } else {
    aiPanel.style.display = 'none';
  }

  // Issues
  const issues = data.issues || [];
  renderIssues(issues);

  showPanel('results');
}

function renderIssues(issues) {
  const filtered = currentFilter === 'all'
    ? issues
    : issues.filter(i => i.severity === currentFilter);

  const list = document.getElementById('issueList');
  if (filtered.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">没有问题</p>';
    return;
  }

  list.innerHTML = filtered.map(issue => {
    const sev = issue.severity.toLowerCase();
    const bclass = sev === 'critical' ? 'b-critical' : 'b-' + sev;
    const fixHtml = issue.fix_suggestion
      ? '<div class="fix">' + esc(issue.fix_suggestion)
        + '<button class="copy-btn" onclick="event.stopPropagation();copyFix(this,'
        + JSON.stringify(JSON.stringify(issue.fix_suggestion))
        + ')">复制</button></div>'
      : '';
    const aiHtml = issue.ai_explanation
      ? '<div class="ai-section">' + esc(issue.ai_explanation) + '</div>'
      : '';
    return '<div class="issue-card" onclick="this.classList.toggle(\'expanded\')">'
      + '<div class="title"><span>'
      + '<span class="sev-dot ' + sev + '"></span>'
      + esc(issue.rule_id) + ': ' + esc(issue.rule_name || '')
      + '</span><span class="badge ' + bclass + '">' + esc(issue.severity) + '</span></div>'
      + '<div class="detail">'
      + '<p>' + esc(issue.message) + '</p>'
      + (issue.detail ? '<p style="margin-top:4px">' + esc(issue.detail) + '</p>' : '')
      + (issue.location ? '<p style="margin-top:4px;color:var(--muted)">位置: ' + esc(issue.location) + '</p>' : '')
      + fixHtml + aiHtml
      + '</div></div>';
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function copyFix(btn, text) {
  navigator.clipboard.writeText(JSON.parse(text));
  btn.textContent = '已复制!';
  setTimeout(() => btn.textContent = '复制', 1500);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  const state = document.querySelector('.panel.active')?.id;
  if (state === 'panel-ready') {
    if (e.key === '1') analyzeStage('opt');
    else if (e.key === '2') analyzeStage('place');
    else if (e.key === '3') analyzeStage('route');
  }
});

// ── Config Panel ──
function showConfigPanel() {
  document.getElementById('configPanel').style.display = '';
  loadConfig();
}

function hideConfigPanel() {
  document.getElementById('configPanel').style.display = 'none';
}

async function loadConfig() {
  try {
    const cfg = await apiGet('/api/config/llm');
    document.getElementById('cfgProvider').value = cfg.provider || 'claude';
    document.getElementById('cfgModel').value = cfg.model || '';
    document.getElementById('cfgBaseUrl').value = cfg.base_url || '';
    document.getElementById('cfgMaxTokens').value = cfg.max_tokens || 2048;
    document.getElementById('cfgTemperature').value = cfg.temperature || 0.3;
    // api_key 不返回，保持输入框为空（表示使用已有配置）
    document.getElementById('cfgApiKey').value = '';
    document.getElementById('cfgApiKey').placeholder = cfg.has_api_key
      ? '已配置（留空保持不变）'
      : 'sk-...（未配置）';
  } catch (e) {
    console.error('Failed to load config:', e);
  }
}

async function saveConfig() {
  const data = {
    provider: document.getElementById('cfgProvider').value,
    model: document.getElementById('cfgModel').value || undefined,
    api_key: document.getElementById('cfgApiKey').value || undefined,
    base_url: document.getElementById('cfgBaseUrl').value || undefined,
    max_tokens: parseInt(document.getElementById('cfgMaxTokens').value),
    temperature: parseFloat(document.getElementById('cfgTemperature').value),
  };
  // 移除 undefined 值
  Object.keys(data).forEach(k => data[k] === undefined && delete data[k]);

  try {
    const result = await apiPost('/api/config/llm', data);
    if (result.success) {
      alert('配置已保存');
      hideConfigPanel();
    } else {
      alert('保存失败: ' + (result.error || '未知错误'));
    }
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

// 修改 apiPost 以支持 body 数据
async function apiPost(path, body) {
  const opts = { method: 'POST' };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(API_BASE + path, opts);
  return r.json();
}

// ── Init ──
initWails();
